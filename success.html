<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulaire envoyé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }
    .check { font-size: 3.5rem; margin-bottom: 20px; }
    h1 { color: #059669; font-size: 1.4rem; margin-bottom: 12px; }
    p { color: #6b7280; font-size: 0.95rem; margin-bottom: 28px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: #7c3aed;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Formulaire envoyé avec succès !</h1>
    <p>Votre réponse a été enregistrée. Merci pour votre soumission.</p>
    <a href="index.html">← Soumettre un autre formulaire</a>
  </div>
</body>
</html>

name: Diagnostic Centris (jetable)

on:
  workflow_dispatch:

jobs:
  discover:
    name: Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Lancer le diagnostic
        run: node immoradar/tools/connectors/discover-centris.mjs

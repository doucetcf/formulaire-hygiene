name: Mise à jour des annonces (Centris)

on:
  schedule:
    # Toutes les 2 heures (gratuit car dépôt public). L'heure GitHub est en UTC.
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Permet de déclencher manuellement depuis l'onglet Actions de GitHub
    inputs:
      max_pages:
        description: 'Pages max par ville (défaut: 10)'
        required: false
        default: '10'
      debug:
        description: 'Mode debug (true/false)'
        required: false
        default: 'false'

jobs:
  fetch:
    name: Récupérer les annonces
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write   # pour pouvoir committer listings.json

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── TEST TEMPORAIRE : lance le connecteur et montre un échantillon ──
      - name: Test connecteur Centris
        run: |
          node immoradar/tools/connectors/centris.mjs --debug || true
          echo "──────── ÉCHANTILLON (3 premières annonces) ────────"
          node -e "
            const d = JSON.parse(require('fs').readFileSync('immoradar/data/listings.json'));
            console.log('Total:', d.sourceStats);
            for (const l of d.listings.slice(0,3)) {
              console.log(JSON.stringify({
                prix: l.price, type: l.typeLabel, adr: l.address, ville: l.city,
                quartier: l.district, cac: l.bedrooms, sdb: l.bathrooms,
                lat: l.lat, lng: l.lng, revenu: l.revenue,
                photo: (l.photoUrl||'').slice(0,70), photosDispo: l.photosAvailable,
                url: l.sources[0].url,
              }, null, 1));
            }
          "
